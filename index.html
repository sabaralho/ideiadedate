<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideia de Date </title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="hearts-container"></div>
    
    <div class="container">
        <!-- TELA 1 - CONVITE -->
        <div id="screen-1" class="screen active">
            <h1>Você sairia comigo? ❤️</h1>
            <div class="buttons">
                <button id="btn-yes" class="btn btn-primary">Sim</button>
                <button id="btn-no" class="btn btn-secondary">Não</button>
            </div>
        </div>

        <!-- TELA 2 - CONFIRMAÇÃO -->
        <div id="screen-2" class="screen">
            <h1>VOCÊ REALMENTE ACEITOU OMG 😳❤️</h1>
            <div class="gif-container">
                <div class="tenor-gif-embed" data-postid="11949252994920444316" data-share-method="host" data-aspect-ratio="1.0" data-width="100%"></div>
                <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
            </div>
            <button id="btn-continue" class="btn btn-primary">Continuar ❤️</button>
        </div>

        <!-- TELA 3 - ESCOLHA DA DATA -->
        <div id="screen-3" class="screen">
            <h1>Agora escolha quando será nosso date ❤️</h1>
            <form id="date-form">
                <div class="form-group">
                    <label for="date-input">Data:</label>
                    <input type="date" id="date-input" required>
                </div>
                <div class="form-group">
                    <label for="time-input">Horário:</label>
                    <select id="time-input" required>
                        <option value="" disabled selected>Selecione um horário</option>
                        <!-- Options geradas pelo JavaScript -->
                    </select>
                </div>
                <button type="submit" id="btn-confirm" class="btn btn-primary">
                    <span class="btn-text">Confirmar Date</span>
                    <span class="loading-spinner hidden"></span>
                </button>
            </form>
        </div>

        <!-- TELA 4 - SUCESSO -->
        <div id="screen-4" class="screen">
            <h1 class="celebration-text">Date marcado ❤️</h1>
            <h2>Quero muito te ver 😍</h2>
            <div class="details-card">
                <p>📅 Data: <span id="display-date"></span></p>
                <p>🕒 Horário: <span id="display-time"></span></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
